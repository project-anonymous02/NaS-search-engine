<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaS - Not a Search Engine</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- SPA redirect handler for Vercel 404 -->
  <script>
    const _redirect = sessionStorage.getItem('spa_redirect');
    if (_redirect) {
      sessionStorage.removeItem('spa_redirect');
      window.history.replaceState(null, '', _redirect);
    }
  </script>

  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }
    a { color: inherit; text-decoration: none; }
    button { border: none; background: none; cursor: pointer; font-family: inherit; color: inherit; }
    input { font-family: inherit; outline: none; background: transparent; border: none; color: inherit; }

    /* ===== VARIABLES ===== */
    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #2a2a2a;
      --accent: #4285f4;
      --accent-light: #5c9aff;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-tertiary: #5f6368;
      --border: #303134;
      --success: #34a853;
      --error: #ea4335;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
    }

    [data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --bg-tertiary: #e8eaed;
      --text-primary: #202124;
      --text-secondary: #5f6368;
      --text-tertiary: #9aa0a6;
      --border: #dadce0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
    }

    /* ===== ANIMATIONS ===== */
    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.6; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }
    @keyframes springIn {
      0% { transform: scale(0.5); opacity: 0; }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes progressBar {
      0% { width: 0%; }
      60% { width: 70%; }
      100% { width: 100%; }
    }
    @keyframes confettiFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.5; }
    }
    @keyframes emojiFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* ===== UTILITY ===== */
    .hidden { display: none !important; }
    .fade-in { animation: fadeIn 0.25s ease-out; }
    .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .skeleton-bar {
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      animation: pulse 1.5s ease-in-out infinite;
    }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ===== APP ===== */
    #app { min-height: 100vh; width: 100%; }

    /* ===== SETTINGS ICON ===== */
    .settings-icon {
      position: absolute;
      top: var(--space-md);
      right: var(--space-md);
      z-index: 10;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      color: var(--text-secondary);
      transition: color 0.2s, background 0.2s, transform 0.2s;
    }
    .settings-icon:hover {
      color: var(--text-primary);
      background: var(--bg-tertiary);
      transform: rotate(30deg);
    }

    /* ===== HOME ===== */
    .home-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-md);
      position: relative;
      gap: var(--space-lg);
    }
    .home-logo {
      font-size: 72px;
      font-weight: 800;
      color: var(--accent);
      user-select: none;
      cursor: grab;
      position: relative;
      animation: float 3s ease-in-out infinite alternate;
      transition: transform 0.15s;
      letter-spacing: -2px;
    }
    .home-logo:active { cursor: grabbing; }
    .home-logo.dragging { animation: none; transition: none; }
    .home-logo.wiggling { animation: wiggle 0.25s ease-in-out infinite alternate; }
    .home-logo.spring-back {
      transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      transform: translate(0, 0) !important;
    }

    .search-bar-container {
      width: 100%;
      max-width: 580px;
      position: relative;
    }
    .search-bar {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      padding: var(--space-sm) var(--space-md);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-bar:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.15);
    }
    .search-bar input {
      flex: 1;
      font-size: 16px;
      min-width: 0;
    }
    .search-bar input::placeholder { color: var(--text-tertiary); }
    .search-bar .search-icon { color: var(--text-tertiary); flex-shrink: 0; }
    .search-bar .clear-btn {
      color: var(--text-tertiary);
      padding: 2px;
      border-radius: var(--radius-full);
      display: none;
      flex-shrink: 0;
    }
    .search-bar .clear-btn:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    .search-bar .clear-btn.visible { display: block; }

    .header-search-bar { height: 44px; padding: var(--space-sm) var(--space-md); }

    .recommendations {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      justify-content: center;
      max-width: 580px;
      width: 100%;
    }
    .rec-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-sm) var(--space-md);
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
      flex: 1 1 180px;
      max-width: 260px;
    }
    .rec-card:hover {
      border-color: rgba(66, 133, 244, 0.4);
      transform: translateY(-2px);
    }
    .rec-card-title {
      font-weight: 500;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    .rec-card-snippet {
      color: var(--text-secondary);
      font-size: 12px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-searches { max-width: 580px; width: 100%; }
    .recent-label {
      color: var(--text-secondary);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-sm);
    }
    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: var(--space-xs) var(--space-sm);
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .chip:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .chip svg { flex-shrink: 0; }

    /* ===== SEARCH PAGE ===== */
    .search-page {
      min-height: 100vh;
      padding-top: 125px;
      padding-bottom: var(--space-2xl, 48px);
    }
    .search-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(15, 15, 15, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: 0 var(--space-md);
      z-index: 10;
      transition: background 0.3s;
    }
    [data-theme="light"] .search-header {
      background: rgba(255, 255, 255, 0.92);
    }
    .search-header-logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: -1px;
    }
    .search-header .search-bar-container { flex: 1; max-width: 680px; }
    .search-header .settings-icon { position: static; flex-shrink: 0; }

    .tabs-nav {
      position: fixed;
      top: 64px;
      left: 0;
      right: 0;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      padding: 0 var(--space-md);
      display: flex;
      gap: var(--space-xl);
      z-index: 9;
      transition: background 0.3s;
    }
    .tab {
      padding: var(--space-sm) 0;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 14px;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      cursor: pointer;
      white-space: nowrap;
    }
    .tab:hover { color: var(--text-primary); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .results-container {
      max-width: 680px;
      margin-left: var(--space-lg);
      padding: 0 var(--space-md);
    }
    .results-meta {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: var(--space-md);
    }

    .result-item {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.2s ease-out;
    }
    .result-item:last-child { border-bottom: none; }
    .result-source {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      font-size: 13px;
      color: var(--text-secondary);
    }
    .result-favicon {
      width: 16px;
      height: 16px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .result-title {
      font-size: 20px;
      font-weight: 500;
      color: var(--accent);
      cursor: pointer;
      line-height: 1.3;
      display: inline;
    }
    .result-title:hover { text-decoration: underline; color: var(--accent-light); }
    .result-url {
      font-size: 14px;
      color: var(--success);
      word-break: break-all;
    }
    .result-snippet {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.5;
    }
    .result-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: rgba(66, 133, 244, 0.1);
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      width: fit-content;
    }

    .featured-result {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-bottom: var(--space-md);
      border: 1px solid var(--border);
      animation: fadeIn 0.3s ease-out;
    }
    .featured-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: var(--space-sm);
    }

    .skeleton-result {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border);
    }
    .skeleton-result .skeleton-bar { height: 12px; }

    /* PAA */
    .paa-section {
      margin-top: var(--space-xl);
      max-width: 680px;
      margin-left: var(--space-lg);
      padding: 0 var(--space-md);
    }
    .paa-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: var(--space-md);
    }
    .accordion-item {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-xs);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-md);
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: background 0.15s;
    }
    .accordion-header:hover { background: var(--bg-tertiary); }
    .accordion-header .chevron {
      transition: transform 0.2s;
      flex-shrink: 0;
      color: var(--text-secondary);
    }
    .accordion-header.open .chevron { transform: rotate(180deg); }
    .accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }
    .accordion-body.open { max-height: 500px; }
    .accordion-content {
      padding: 0 var(--space-md) var(--space-md);
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.2s 0.1s;
    }
    .accordion-body.open .accordion-content { opacity: 1; }

    .related-section {
      margin-top: var(--space-xl);
      max-width: 680px;
      margin-left: var(--space-lg);
      padding: 0 var(--space-md);
    }
    .related-title {
      color: var(--text-secondary);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-sm);
    }

    /* IMAGE GRID */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: var(--space-sm);
      padding: var(--space-md);
    }
    .image-card {
      aspect-ratio: 1;
      border-radius: var(--radius-sm);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--bg-tertiary);
    }
    .image-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.2s;
    }
    .image-card:hover img { transform: scale(1.05); }
    .image-card .image-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: var(--space-md) var(--space-sm) var(--space-sm);
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: white;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .image-card:hover .image-overlay { opacity: 1; }

    /* VIDEO GRID */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-md);
      padding: var(--space-md);
    }
    .video-card {
      cursor: pointer;
      transition: transform 0.15s;
    }
    .video-card:hover { transform: scale(1.02); }
    .video-card:hover .video-title { color: var(--accent); }
    .video-thumb {
      aspect-ratio: 16/9;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-tertiary);
      position: relative;
    }
    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.2s;
    }
    .video-card:hover .video-thumb img { transform: scale(1.03); }
    .video-duration {
      position: absolute;
      bottom: var(--space-sm);
      right: var(--space-sm);
      background: rgba(0,0,0,0.8);
      color: white;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
    }
    .video-title {
      font-size: 14px;
      font-weight: 500;
      margin-top: var(--space-sm);
      line-height: 1.3;
      transition: color 0.15s;
    }
    .video-source {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      color: var(--text-secondary);
      font-size: 12px;
      margin-top: 2px;
    }

    /* EMPTY STATE */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-xl) var(--space-md);
      color: var(--text-secondary);
      text-align: center;
    }
    .empty-state svg { color: var(--text-tertiary); }
    .empty-state .try-again-btn {
      background: var(--accent);
      color: white;
      padding: var(--space-sm) var(--space-lg);
      border-radius: var(--radius-md);
      font-weight: 500;
      transition: background 0.15s, transform 0.15s;
    }
    .empty-state .try-again-btn:hover {
      background: #3367d6;
      transform: scale(1.02);
    }

    /* IN-APP BROWSER */
    #in-app-browser {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg-primary);
      display: none;
      flex-direction: column;
    }
    #in-app-browser.active { display: flex; }
    .browser-toolbar {
      height: 52px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: 0 var(--space-sm);
      position: relative;
      flex-shrink: 0;
    }
    .browser-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      color: var(--text-secondary);
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .browser-btn:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    .browser-btn:disabled {
      color: var(--text-tertiary);
      opacity: 0.4;
      cursor: not-allowed;
    }
    .browser-btn.refreshing svg { animation: spin 0.5s ease-out; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .browser-address {
      flex: 1;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      padding: var(--space-xs) var(--space-sm);
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .browser-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: var(--accent);
      width: 0%;
    }
    .browser-progress.loading { animation: progressBar 2s ease-out forwards; }
    .browser-progress.done {
      width: 100%;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .browser-frame-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .browser-frame-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    .browser-error {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
      padding: var(--space-xl);
      text-align: center;
    }
    .browser-error.active { display: flex; }
    .browser-error-title { font-size: 18px; font-weight: 500; }
    .browser-error-msg { font-size: 14px; color: var(--text-secondary); }
    .browser-error-url {
      font-family: monospace;
      font-size: 13px;
      color: var(--accent);
      background: var(--bg-secondary);
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--radius-sm);
      word-break: break-all;
    }
    .browser-error-btn {
      background: var(--accent);
      color: white;
      padding: var(--space-sm) var(--space-lg);
      border-radius: var(--radius-md);
      font-weight: 500;
      transition: background 0.15s;
    }
    .browser-error-btn:hover { background: #3367d6; }

    /* SETTINGS MODAL */
    #settings-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #settings-modal.active { display: flex; }
    .modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease-out;
    }
    .modal-content {
      position: relative;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      max-width: 480px;
      width: 90vw;
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-lg);
    }
    .modal-title { font-size: 20px; font-weight: 600; }
    .modal-close {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      color: var(--text-secondary);
      transition: color 0.15s, background 0.15s;
    }
    .modal-close:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    .settings-section { margin-bottom: var(--space-lg); }
    .settings-label {
      color: var(--text-secondary);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-sm);
    }
    .toggle-switch {
      display: inline-flex;
      background: var(--bg-tertiary);
      border-radius: var(--radius-full);
      padding: 3px;
      gap: 3px;
    }
    .toggle-option {
      padding: var(--space-xs) var(--space-md);
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      border: none;
    }
    .toggle-option.active { background: var(--accent); color: white; }
    .settings-btn {
      width: 100%;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      padding: var(--space-sm);
      font-size: 14px;
      text-align: left;
      transition: background 0.15s, color 0.15s;
      margin-bottom: var(--space-xs);
    }
    .settings-btn:hover { background: rgba(234, 67, 53, 0.15); color: var(--error); }

    /* NYAHOO */
    .nyahoo-page {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-xl);
      padding: var(--space-xl);
    }
    .confetti-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      top: -20px;
      animation: confettiFall linear infinite;
    }
    .nyahoo-heading {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      z-index: 2;
      animation: springIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) both;
    }
    .nyahoo-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--space-md);
      max-width: 600px;
      width: 100%;
      z-index: 2;
    }
    .nyahoo-images img {
      width: 100%;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      animation: fadeIn 0.4s ease-out both;
    }
    .nyahoo-emojis {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--space-md);
      max-width: 400px;
      z-index: 2;
    }
    .nyahoo-emoji {
      font-size: 48px;
      animation: emojiFloat 3s ease-in-out infinite alternate;
    }
    .nyahoo-back-btn {
      background: var(--accent);
      color: white;
      padding: var(--space-sm) var(--space-lg);
      border-radius: var(--radius-md);
      font-weight: 500;
      font-size: 16px;
      z-index: 2;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .nyahoo-back-btn:hover { transform: scale(1.05); box-shadow: var(--shadow-lg); }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: var(--radius-full); }
    ::-webkit-scrollbar-thumb:hover { background: var(--border); }

    /* RESPONSIVE */
    @media (min-width: 640px) {
      .home-logo { font-size: 96px; }
      .nyahoo-heading { font-size: 36px; }
      .results-container, .paa-section, .related-section { margin-left: var(--space-lg); }
    }
    @media (max-width: 639px) {
      .results-container, .paa-section, .related-section { margin-left: 0; }
      .image-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
      .video-grid { grid-template-columns: 1fr; }
      .search-header { gap: var(--space-sm); padding: 0 var(--space-sm); }
      .tabs-nav { gap: var(--space-lg); padding: 0 var(--space-sm); }
      .browser-address { font-size: 11px; }
    }
    @media (min-width: 1024px) {
      .results-container, .paa-section, .related-section {
        margin-left: calc(var(--space-lg) + 80px);
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- IN-APP BROWSER -->
  <div id="in-app-browser">
    <div class="browser-toolbar">
      <button class="browser-btn" id="browser-close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <button class="browser-btn" id="browser-back" disabled><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <button class="browser-btn" id="browser-forward" disabled><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>
      <button class="browser-btn" id="browser-refresh"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1 2.12-9.36L23 10"/></svg></button>
      <div class="browser-address" id="browser-address">about:blank</div>
      <button class="browser-btn" id="browser-external"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>
      <div class="browser-progress" id="browser-progress"></div>
    </div>
    <div class="browser-frame-container">
      <iframe id="browser-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      <div class="browser-error" id="browser-error">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <div class="browser-error-title">This website cannot be displayed</div>
        <div class="browser-error-msg">The site has blocked embedding via X-Frame-Options.</div>
        <div class="browser-error-url" id="browser-error-url"></div>
        <button class="browser-error-btn" id="browser-error-open">Open in New Tab</button>
      </div>
    </div>
  </div>

  <!-- SETTINGS MODAL -->
  <div id="settings-modal">
    <div class="modal-overlay" id="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">Settings</div>
        <button class="modal-close" id="modal-close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="settings-section">
        <div class="settings-label">Language / Bahasa</div>
        <div class="toggle-switch">
          <button class="toggle-option" data-lang="en">English</button>
          <button class="toggle-option" data-lang="id">Indonesia</button>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Theme / Tema</div>
        <div class="toggle-switch">
          <button class="toggle-option" data-theme="dark">Dark</button>
          <button class="toggle-option" data-theme="light">Light</button>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label">Data</div>
        <button class="settings-btn" id="clear-history-btn">Clear Search History</button>
        <button class="settings-btn" id="clear-cache-btn">Clear Recommendations Cache</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // STATE
    // ============================================================
    const state = {
      route: '/home',
      query: '',
      tab: 'all',
      theme: localStorage.getItem('nas_theme') || 'dark',
      language: localStorage.getItem('nas_language') || 'en',
      searchHistory: JSON.parse(localStorage.getItem('nas_search_history') || '[]'),
      recommendations: JSON.parse(localStorage.getItem('nas_recommendations') || '{}'),
      isSettingsOpen: false,
      isBrowserOpen: false,
      browserUrl: '',
      isLoading: false,
      searchResults: [],
      peopleAlsoAsk: [],
      relatedSearches: [],
      imageResults: [],
      videoResults: [],
      logoPos: { x: 0, y: 0 },
      isDraggingLogo: false,
      dragOffset: { x: 0, y: 0 },
    };

    document.documentElement.setAttribute('data-theme', state.theme);

    // ============================================================
    // ICONS
    // ============================================================
    const ICONS = {
      search: `<svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
      clear: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
      clock: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
      settings: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4m0 14v4m4.22-10.22l2.83-2.83M6.95 17.05l2.83-2.83M23 12h-4M5 12H1m16.22 4.22l2.83 2.83M6.95 6.95l2.83 2.83"/></svg>`,
      chevron: `<svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`,
      wiki: `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>`,
      imageOff: `<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`,
    };

    // ============================================================
    // CURATED SOURCES
    // ============================================================
    const CURATED = {
      'python': [
        { title: 'Python.org', url: 'https://www.python.org', snippet: 'Official Python programming language website.' },
        { title: 'PyPI', url: 'https://pypi.org', snippet: 'Python Package Index repository.' },
        { title: 'Python Docs', url: 'https://docs.python.org/3/', snippet: 'Official Python 3 documentation.' },
      ],
      'javascript': [
        { title: 'MDN JavaScript', url: 'https://developer.mozilla.org/en-US/docs/Web/JavaScript', snippet: 'Comprehensive JavaScript docs.' },
        { title: 'JavaScript.info', url: 'https://javascript.info', snippet: 'Modern JavaScript tutorial.' },
        { title: 'npm', url: 'https://www.npmjs.com', snippet: 'Node Package Manager.' },
      ],
      'react': [
        { title: 'React', url: 'https://react.dev', snippet: 'UI library for web and native.' },
        { title: 'React Docs', url: 'https://react.dev/learn', snippet: 'Learn React.' },
      ],
      'github': [
        { title: 'GitHub', url: 'https://github.com', snippet: 'Code hosting platform.' },
      ],
      'html': [
        { title: 'MDN HTML', url: 'https://developer.mozilla.org/en-US/docs/Web/HTML', snippet: 'HTML reference.' },
        { title: 'HTML.com', url: 'https://html.com', snippet: 'HTML guides.' },
      ],
      'css': [
        { title: 'MDN CSS', url: 'https://developer.mozilla.org/en-US/docs/Web/CSS', snippet: 'CSS reference.' },
        { title: 'CSS-Tricks', url: 'https://css-tricks.com', snippet: 'CSS articles.' },
      ],
      'nodejs': [
        { title: 'Node.js', url: 'https://nodejs.org', snippet: 'JavaScript runtime.' },
        { title: 'npm', url: 'https://www.npmjs.com', snippet: 'Package manager for Node.js.' },
      ],
    };

    // ============================================================
    // ROUTING
    // ============================================================
    function navigateTo(url) {
      window.history.pushState({}, '', url);
      handleRoute();
    }

    function handleRoute() {
      const path = window.location.pathname;
      const params = new URLSearchParams(window.location.search);

      if (path === '/' || path === '') {
        navigateTo('/home');
        return;
      }

      state.route = path;
      state.query = params.get('q') || '';
      state.tab = params.get('tab') || 'all';

      render();

      if (state.route === '/search' && state.query) {
        if (state.query.toLowerCase() === 'nyahoo') {
          renderNyahooPage();
        } else {
          performSearch();
        }
      }
    }

    window.addEventListener('popstate', handleRoute);

    document.addEventListener('click', (e) => {
      const a = e.target.closest('a');
      if (a && a.getAttribute('href') && a.getAttribute('href').startsWith('/') && !a.getAttribute('href').startsWith('//')) {
        e.preventDefault();
        navigateTo(a.getAttribute('href'));
      }
    });

    // ============================================================
    // RENDER
    // ============================================================
    function render() {
      const app = document.getElementById('app');
      if (state.route === '/home') {
        app.innerHTML = '';
        app.appendChild(renderHome());
      } else if (state.route === '/search') {
        app.innerHTML = '';
        if (state.query.toLowerCase() === 'nyahoo') {
          app.appendChild(renderNyahooPage());
        } else {
          app.appendChild(renderSearchPage());
        }
      }
    }

    function renderHome() {
      const container = document.createElement('div');
      container.className = 'home-page fade-in';

      const settingsBtn = document.createElement('button');
      settingsBtn.className = 'settings-icon';
      settingsBtn.innerHTML = ICONS.settings;
      settingsBtn.onclick = openSettings;
      container.appendChild(settingsBtn);

      const logo = document.createElement('div');
      logo.className = 'home-logo';
      logo.textContent = 'NaS';
      setupDraggableLogo(logo);
      container.appendChild(logo);

      const searchContainer = document.createElement('div');
      searchContainer.className = 'search-bar-container';
      searchContainer.innerHTML = `
        <div class="search-bar">
          ${ICONS.search}
          <input type="text" placeholder="${state.language === 'id' ? 'Cari di NaS atau ketik URL' : 'Search NaS or type a URL'}" id="home-search-input" autocomplete="off" />
          <button class="clear-btn" id="home-clear-btn">${ICONS.clear}</button>
        </div>
      `;
      container.appendChild(searchContainer);

      setTimeout(() => {
        const input = document.getElementById('home-search-input');
        const clearBtn = document.getElementById('home-clear-btn');
        if (!input) return;
        input.focus();
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && input.value.trim()) {
            navigateTo('/search?q=' + encodeURIComponent(input.value.trim()));
          }
        });
        input.addEventListener('input', () => clearBtn.classList.toggle('visible', input.value.length > 0));
        clearBtn.addEventListener('click', () => { input.value = ''; clearBtn.classList.remove('visible'); input.focus(); });
      }, 0);

      // Recommendations
      const recs = getRecommendations();
      if (recs.length > 0) {
        const recsContainer = document.createElement('div');
        recsContainer.className = 'recommendations slide-up';
        recs.forEach(rec => {
          const card = document.createElement('div');
          card.className = 'rec-card';
          card.innerHTML = `<div class="rec-card-title">${ICONS.wiki} ${rec.title}</div><div class="rec-card-snippet">${rec.snippet}</div>`;
          card.addEventListener('click', () => navigateTo('/search?q=' + encodeURIComponent(rec.title)));
          recsContainer.appendChild(card);
        });
        container.appendChild(recsContainer);
      }

      // Recent searches
      if (state.searchHistory.length > 0) {
        const recentContainer = document.createElement('div');
        recentContainer.className = 'recent-searches slide-up';
        const label = document.createElement('div');
        label.className = 'recent-label';
        label.textContent = state.language === 'id' ? 'Pencarian terakhir' : 'Recent searches';
        recentContainer.appendChild(label);
        const chipsRow = document.createElement('div');
        chipsRow.className = 'chips-row';
        state.searchHistory.slice(0, 10).forEach(query => {
          const chip = document.createElement('div');
          chip.className = 'chip';
          chip.innerHTML = `${ICONS.clock} ${query}`;
          chip.addEventListener('click', () => navigateTo('/search?q=' + encodeURIComponent(query)));
          chipsRow.appendChild(chip);
        });
        recentContainer.appendChild(chipsRow);
        container.appendChild(recentContainer);
      }

      return container;
    }

    function renderSearchPage() {
      const container = document.createElement('div');
      container.className = 'search-page';

      const header = document.createElement('div');
      header.className = 'search-header';
      header.innerHTML = `
        <div class="search-header-logo">NaS</div>
        <div class="search-bar-container">
          <div class="search-bar header-search-bar">
            ${ICONS.search}
            <input type="text" value="${escapeHtml(state.query)}" id="header-search-input" autocomplete="off" />
            <button class="clear-btn visible" id="header-clear-btn">${ICONS.clear}</button>
          </div>
        </div>
        <button class="settings-icon" id="header-settings-btn">${ICONS.settings}</button>
      `;
      header.querySelector('.search-header-logo').addEventListener('click', () => navigateTo('/home'));
      header.querySelector('#header-settings-btn').addEventListener('click', openSettings);
      container.appendChild(header);

      const tabsNav = document.createElement('div');
      tabsNav.className = 'tabs-nav';
      ['all', 'images', 'videos'].forEach(tab => {
        const tabEl = document.createElement('div');
        tabEl.className = 'tab' + (state.tab === tab ? ' active' : '');
        const labels = {
          all: state.language === 'id' ? 'Semua' : 'All',
          images: state.language === 'id' ? 'Gambar' : 'Images',
          videos: state.language === 'id' ? 'Video' : 'Videos',
        };
        tabEl.textContent = labels[tab];
        tabEl.addEventListener('click', () => {
          const url = '/search?q=' + encodeURIComponent(state.query) + (tab !== 'all' ? '&tab=' + tab : '');
          navigateTo(url);
        });
        tabsNav.appendChild(tabEl);
      });
      container.appendChild(tabsNav);

      const contentArea = document.createElement('div');
      contentArea.id = 'search-content';
      container.appendChild(contentArea);

      setTimeout(() => {
        const input = document.getElementById('header-search-input');
        const clearBtn = document.getElementById('header-clear-btn');
        if (!input) return;
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && input.value.trim()) {
            navigateTo('/search?q=' + encodeURIComponent(input.value.trim()));
          }
        });
        clearBtn.addEventListener('click', () => { input.value = ''; input.focus(); });
      }, 0);

      return container;
    }

    function renderSearchResultsContent() {
      const content = document.getElementById('search-content');
      if (!content) return;
      content.innerHTML = '';

      if (state.isLoading) {
        content.innerHTML = renderSkeletonResults();
        return;
      }

      if (state.tab === 'all') renderAllTab(content);
      else if (state.tab === 'images') renderImagesTab(content);
      else if (state.tab === 'videos') renderVideosTab(content);
    }

    function renderAllTab(container) {
      const wrap = document.createElement('div');

      const meta = document.createElement('div');
      meta.className = 'results-meta';
      meta.textContent = (state.language === 'id' ? 'Sekitar ' : 'About ') + state.searchResults.length +
        (state.language === 'id' ? ' hasil' : ' results') + (state.query ? ' untuk "' + state.query + '"' : '');
      wrap.appendChild(meta);

      const resultsContainer = document.createElement('div');
      resultsContainer.className = 'results-container';

      // Featured Wikipedia
      const wikiResult = state.searchResults.find(r => r.source === 'wikipedia' || r.source === 'Wikipedia');
      if (wikiResult) {
        const featured = document.createElement('div');
        featured.className = 'featured-result';
        featured.innerHTML = `
          <div class="featured-badge">${ICONS.wiki} Wikipedia</div>
          <div class="result-title" data-url="${wikiResult.url}">${wikiResult.title}</div>
          <div class="result-snippet">${wikiResult.snippet}</div>
        `;
        featured.querySelector('.result-title').addEventListener('click', () => openInAppBrowser(wikiResult.url));
        resultsContainer.appendChild(featured);
      }

      // Regular results
      const regular = state.searchResults.filter(r => r.source !== 'wikipedia' && r.source !== 'Wikipedia');
      regular.forEach((result, i) => {
        const item = document.createElement('div');
        item.className = 'result-item';
        item.style.animationDelay = (i * 0.04) + 's';
        const domain = extractDomain(result.url);
        item.innerHTML = `
          <div class="result-source">
            <img class="result-favicon" src="https://www.google.com/s2/favicons?domain=${domain}&sz=32" alt="" onerror="this.style.display='none'" />
            <span>${domain}</span>
          </div>
          <div class="result-title" data-url="${result.url}">${result.title}</div>
          <div class="result-url">${result.url}</div>
          <div class="result-snippet">${result.snippet || ''}</div>
          ${result.source ? `<span class="result-tag">${result.source}</span>` : ''}
        `;
        item.querySelector('.result-title').addEventListener('click', () => openInAppBrowser(result.url));
        resultsContainer.appendChild(item);
      });

      if (state.searchResults.length === 0 && !state.isLoading) {
        resultsContainer.innerHTML = `
          <div class="empty-state">
            ${ICONS.search}
            <div>${state.language === 'id' ? 'Tidak ada hasil untuk' : 'No results for'} "${escapeHtml(state.query)}"</div>

    // ============================================================
    // FETCH WITH TIMEOUT
    // ============================================================
    function fetchWithTimeout(url, options = {}, ms = 8000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), ms);
      return fetch(url, { ...options, signal: controller.signal })
        .finally(() => clearTimeout(id));
    }

    // ============================================================
    // SEARCH — MAIN
    // ============================================================
    async function performSearch() {
      const cacheKey = `nas_cache_${state.query}_${state.tab}`;
      const cached = sessionStorage.getItem(cacheKey);
      if (cached) {
        try {
          const c = JSON.parse(cached);
          Object.assign(state, c);
          state.isLoading = false;
          renderSearchResultsContent();
          return;
        } catch (e) {}
      }

      state.isLoading = true;
      state.searchResults = [];
      state.peopleAlsoAsk = [];
      state.relatedSearches = [];
      state.imageResults = [];
      state.videoResults = [];
      renderSearchResultsContent();

      if (state.query && !state.searchHistory.includes(state.query)) {
        state.searchHistory.unshift(state.query);
        if (state.searchHistory.length > 20) state.searchHistory.pop();
        localStorage.setItem('nas_search_history', JSON.stringify(state.searchHistory));
      }

      try {
        if (state.tab === 'all') {
          // Jalankan semua sumber secara paralel dengan Promise.allSettled
          const results = await Promise.allSettled([
            fetchWikipedia(),
            fetchDuckDuckGo(),
            fetchOpenSearch(),
            fetchCuratedSources(),
          ]);
          // Setelah semua selesai, render ulang
          state.isLoading = false;
          renderSearchResultsContent();
        } else if (state.tab === 'images') {
          await fetchImages();
        } else if (state.tab === 'videos') {
          await fetchVideos();
        }
      } catch (e) {
        console.error('Search error:', e);
      }

      state.isLoading = false;
      renderSearchResultsContent();

      try {
        sessionStorage.setItem(cacheKey, JSON.stringify({
          searchResults: state.searchResults,
          peopleAlsoAsk: state.peopleAlsoAsk,
          relatedSearches: state.relatedSearches,
          imageResults: state.imageResults,
          videoResults: state.videoResults,
        }));
      } catch (e) {}
    }

    // ============================================================
    // FETCH WIKIPEDIA (15 hasil, paralel)
    // ============================================================
    async function fetchWikipedia() {
      try {
        const res = await fetchWithTimeout(
          `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(state.query)}&format=json&origin=*`
        );
        const data = await res.json();
        if (!data.query?.search) return;

        const items = data.query.search.slice(0, 15);
        const results = await Promise.allSettled(items.map(async (item) => {
          let snippet = item.snippet.replace(/<[^>]*>/g, '');
          try {
            const summaryRes = await fetchWithTimeout(
              `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(item.title)}`
            );
            const s = await summaryRes.json();
            if (s.extract) snippet = s.extract.substring(0, 300);
          } catch (e) {}
          return {
            title: item.title,
            url: `https://en.wikipedia.org/wiki/${encodeURIComponent(item.title.replace(/ /g, '_'))}`,
            snippet,
            source: 'wikipedia',
          };
        }));

        const existingTitles = new Set(state.searchResults.map(r => r.title));
        results.forEach(r => {
          if (r.status === 'fulfilled' && !existingTitles.has(r.value.title)) {
            state.searchResults.push(r.value);
            existingTitles.add(r.value.title);
          }
        });
      } catch (e) { console.error('Wikipedia error:', e); }
    }

    // ============================================================
    // FETCH DUCKDUCKGO (Results + RelatedTopics)
    // ============================================================
    async function fetchDuckDuckGo() {
      try {
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(
          `https://api.duckduckgo.com/?q=${encodeURIComponent(state.query)}&format=json&no_html=1&no_redirect=1&skip_disambig=1`
        );
        const res = await fetchWithTimeout(proxyUrl);
        const data = await res.json();

        // Abstract
        if (data.AbstractText) {
          state.searchResults.push({
            title: data.Heading || state.query,
            url: data.AbstractURL || `https://duckduckgo.com/?q=${encodeURIComponent(state.query)}`,
            snippet: data.AbstractText,
            source: 'Wikipedia (DDG)',
          });
        }

        // Results
        if (data.Results && Array.isArray(data.Results)) {
          data.Results.forEach(r => {
            if (r.FirstURL && r.Text) {
              const parts = r.Text.split(' - ');
              state.searchResults.push({
                title: parts[0] || r.Text,
                url: r.FirstURL,
                snippet: parts.slice(1).join(' - ') || '',
                source: 'DuckDuckGo',
              });
            }
          });
        }

        // RelatedTopics → PAA & related
        if (data.RelatedTopics && Array.isArray(data.RelatedTopics)) {
          data.RelatedTopics.forEach(topic => {
            if (topic.Text && topic.FirstURL) {
              const parts = topic.Text.split(' - ');
              if (parts.length >= 2) {
                state.peopleAlsoAsk.push({
                  question: parts[0].trim(),
                  answer: parts.slice(1).join(' - ').trim() || 'Learn more',
                });
              } else if (topic.Text.length > 5) {
                state.relatedSearches.push(topic.Text);
              }
            }
          });
        }
      } catch (e) { console.error('DuckDuckGo error:', e); }
    }

    // ============================================================
    // FETCH OPENSEARCH (fallback tambahan)
    // ============================================================
    async function fetchOpenSearch() {
      try {
        const res = await fetchWithTimeout(
          `https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(state.query)}&limit=10&namespace=0&format=json`
        );
        const data = await res.json();
        if (data && data[1]) {
          for (let i = 0; i < data[1].length; i++) {
            // Cek duplikat
            const existing = state.searchResults.some(r => r.title === data[1][i]);
            if (!existing) {
              state.searchResults.push({
                title: data[1][i],
                url: data[3][i] || `https://en.wikipedia.org/wiki/${encodeURIComponent(data[1][i].replace(/ /g, '_'))}`,
                snippet: data[2][i] || '',
                source: 'Wikipedia (OpenSearch)',
              });
            }
          }
        }
      } catch (e) { console.error('OpenSearch error:', e); }
    }

    // ============================================================
    // FETCH CURATED SOURCES
    // ============================================================
    async function fetchCuratedSources() {
      const key = Object.keys(CURATED).find(k => state.query.toLowerCase().includes(k));
      if (key) {
        CURATED[key].forEach(item => {
          state.searchResults.push({ ...item, source: 'Curated' });
        });
      }
    }

    // ============================================================
    // FETCH IMAGES (parallel)
    // ============================================================
    async function fetchImages() {
      try {
        const res = await fetchWithTimeout(
          `https://commons.wikimedia.org/w/api.php?action=query&list=search&srnamespace=6&srsearch=${encodeURIComponent(state.query)}&format=json&origin=*`
        );
        const data = await res.json();
        if (!data.query?.search) return;

        const items = data.query.search.slice(0, 16);
        const results = await Promise.allSettled(items.map(async (item) => {
          const imgRes = await fetchWithTimeout(
            `https://commons.wikimedia.org/w/api.php?action=query&titles=File:${encodeURIComponent(item.title.replace('File:', ''))}&prop=imageinfo&iiprop=url|thumburl&iiurlwidth=400&format=json&origin=*`
          );
          const imgData = await imgRes.json();
          const page = Object.values(imgData.query.pages)[0];
          if (!page.imageinfo?.[0]) throw new Error('no image');
          const info = page.imageinfo[0];
          return {
            url: info.thumburl || info.url,
            title: item.title.replace('File:', '').replace(/_/g, ' '),
            pageUrl: info.descriptionurl || '',
          };
        }));

        state.imageResults = results.filter(r => r.status === 'fulfilled').map(r => r.value);
      } catch (e) { console.error('Images error:', e); }
    }

    // ============================================================
    // FETCH VIDEOS (Piped API)
    // ============================================================
    async function fetchVideos() {
      try {
        const res = await fetchWithTimeout(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(state.query)}&filter=videos`);
        const data = await res.json();
        if (data.items) {
          state.videoResults = data.items.slice(0, 20).map(item => ({
            title: item.title,
            url: `https://www.youtube.com/watch?v=${item.url.split('v=')[1] || item.url.split('/').pop()}`,
            thumbnail: item.thumbnail,
            duration: item.duration ? formatDuration(item.duration) : '',
          }));
        }
      } catch (e) {
        console.error('Videos error:', e);
        state.videoResults = [{
          title: `Search "${state.query}" on YouTube`,
          url: `https://www.youtube.com/results?search_query=${encodeURIComponent(state.query)}`,
          thumbnail: 'https://img.youtube.com/vi/0/0.jpg',
          duration: '',
        }];
      }
    }

    function formatDuration(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    // ============================================================
    // RECOMMENDATIONS
    // ============================================================
    function getRecommendations() {
      if (state.searchHistory.length === 0) return [];
      const freq = {};
      state.searchHistory.forEach(q => { const key = q.toLowerCase(); freq[key] = (freq[key] || 0) + 1; });
      const top = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 3).map(([term]) => term);
      const recs = [];
      top.forEach(term => {
        if (state.recommendations[term]) recs.push(state.recommendations[term]);
        else fetchWikipediaSummary(term);
      });
      return recs;
    }

    async function fetchWikipediaSummary(term) {
      try {
        const res = await fetchWithTimeout(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(term)}`);
        const data = await res.json();
        if (data.extract) {
          state.recommendations[term] = {
            title: data.title || term,
            snippet: data.extract.substring(0, 120) + '...',
          };
          localStorage.setItem('nas_recommendations', JSON.stringify(state.recommendations));
          if (state.route === '/home') render();
        }
      } catch (e) {}
    }

    // ============================================================
    // DRAGGABLE LOGO
    // ============================================================
    function setupDraggableLogo(logo) {
      const onStart = (e) => {
        state.isDraggingLogo = true;
        logo.classList.add('dragging', 'wiggling');
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const rect = logo.getBoundingClientRect();
        state.dragOffset.x = clientX - (rect.left + rect.width / 2);
        state.dragOffset.y = clientY - (rect.top + rect.height / 2);
        if (navigator.vibrate) navigator.vibrate(10);
      };
      const onMove = (e) => {
        if (!state.isDraggingLogo) return;
        e.preventDefault();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = clientX - state.dragOffset.x - window.innerWidth / 2;
        const y = clientY - state.dragOffset.y - window.innerHeight / 2;
        const maxX = window.innerWidth / 2 - logo.offsetWidth / 2;
        const maxY = window.innerHeight / 2 - logo.offsetHeight / 2;
        state.logoPos.x = Math.max(-maxX, Math.min(maxX, x));
        state.logoPos.y = Math.max(-maxY, Math.min(maxY, y));
        logo.style.transform = `translate(${state.logoPos.x}px, ${state.logoPos.y}px) scale(1.05)`;
      };
      const onEnd = () => {
        if (!state.isDraggingLogo) return;
        state.isDraggingLogo = false;
        logo.classList.remove('dragging', 'wiggling');
        state.logoPos = { x: 0, y: 0 };
        logo.classList.add('spring-back');
        logo.style.transform = '';
        setTimeout(() => logo.classList.remove('spring-back'), 600);
      };
      logo.addEventListener('mousedown', onStart);
      logo.addEventListener('touchstart', onStart, { passive: true });
      document.addEventListener('mousemove', onMove);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchend', onEnd);
    }

    // ============================================================
    // IN-APP BROWSER
    // ============================================================
    function openInAppBrowser(url) {
      state.isBrowserOpen = true;
      state.browserUrl = url;
      const browser = document.getElementById('in-app-browser');
      const iframe = document.getElementById('browser-iframe');
      const address = document.getElementById('browser-address');
      const errorEl = document.getElementById('browser-error');
      const progress = document.getElementById('browser-progress');

      browser.classList.add('active');
      document.body.style.overflow = 'hidden';
      address.textContent = url;
      errorEl.classList.remove('active');
      progress.classList.remove('done');
      progress.classList.add('loading');

      let loadTimeout;
      let loaded = false;
      iframe.onload = () => { loaded = true; clearTimeout(loadTimeout); progress.classList.remove('loading'); progress.classList.add('done'); };
      iframe.onerror = () => { showBrowserError(url); };
      iframe.src = url;
      loadTimeout = setTimeout(() => { if (!loaded) showBrowserError(url); }, 5000);
      document.getElementById('browser-error-url').textContent = url;
    }

    function showBrowserError(url) {
      const iframe = document.getElementById('browser-iframe');
      const errorEl = document.getElementById('browser-error');
      const progress = document.getElementById('browser-progress');
      iframe.style.display = 'none';
      errorEl.classList.add('active');
      progress.classList.remove('loading');
      progress.classList.add('done');
    }

    function closeInAppBrowser() {
      const browser = document.getElementById('in-app-browser');
      const iframe = document.getElementById('browser-iframe');
      const errorEl = document.getElementById('browser-error');
      const progress = document.getElementById('browser-progress');
      browser.classList.remove('active');
      document.body.style.overflow = '';
      iframe.src = 'about:blank';
      iframe.style.display = '';
      errorEl.classList.remove('active');
      progress.classList.remove('loading', 'done');
      state.isBrowserOpen = false;
      state.browserUrl = '';
    }

    document.getElementById('browser-close').addEventListener('click', closeInAppBrowser);
    document.getElementById('browser-back').addEventListener('click', () => { try { document.getElementById('browser-iframe').contentWindow.history.back(); } catch(e) {} });
    document.getElementById('browser-forward').addEventListener('click', () => { try { document.getElementById('browser-iframe').contentWindow.history.forward(); } catch(e) {} });
    document.getElementById('browser-refresh').addEventListener('click', () => {
      const btn = document.getElementById('browser-refresh');
      btn.classList.add('refreshing');
      setTimeout(() => btn.classList.remove('refreshing'), 500);
      if (state.browserUrl) document.getElementById('browser-iframe').src = state.browserUrl;
    });
    document.getElementById('browser-external').addEventListener('click', () => { if (state.browserUrl) window.open(state.browserUrl, '_blank'); });
    document.getElementById('browser-error-open').addEventListener('click', () => { if (state.browserUrl) window.open(state.browserUrl, '_blank'); });

    // ============================================================
    // SETTINGS
    // ============================================================
    function openSettings() {
      state.isSettingsOpen = true;
      document.getElementById('settings-modal').classList.add('active');
      document.body.style.overflow = 'hidden';
      document.querySelectorAll('.toggle-option[data-lang]').forEach(b => b.classList.toggle('active', b.dataset.lang === state.language));
      document.querySelectorAll('.toggle-option[data-theme]').forEach(b => b.classList.toggle('active', b.dataset.theme === state.theme));
    }

    function closeSettings() {
      state.isSettingsOpen = false;
      document.getElementById('settings-modal').classList.remove('active');
      document.body.style.overflow = '';
    }

    document.querySelectorAll('.toggle-option[data-lang]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.language = btn.dataset.lang;
        localStorage.setItem('nas_language', state.language);
        document.querySelectorAll('.toggle-option[data-lang]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
        if (state.route === '/search' && state.query) performSearch();
      });
    });

    document.querySelectorAll('.toggle-option[data-theme]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.theme = btn.dataset.theme;
        localStorage.setItem('nas_theme', state.theme);
        document.documentElement.setAttribute('data-theme', state.theme);
        document.querySelectorAll('.toggle-option[data-theme]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    document.getElementById('clear-history-btn').addEventListener('click', () => {
      if (confirm(state.language === 'id' ? 'Hapus semua riwayat pencarian?' : 'Clear all search history?')) {
        state.searchHistory = [];
        localStorage.removeItem('nas_search_history');
        if (state.route === '/home') render();
      }
    });

    document.getElementById('clear-cache-btn').addEventListener('click', () => {
      if (confirm(state.language === 'id' ? 'Hapus cache rekomendasi?' : 'Clear recommendations cache?')) {
        state.recommendations = {};
        localStorage.removeItem('nas_recommendations');
        if (state.route === '/home') render();
      }
    });

    document.getElementById('modal-overlay').addEventListener('click', closeSettings);
    document.getElementById('modal-close').addEventListener('click', closeSettings);

    // ============================================================
    // TRANSLATE (LibreTranslate)
    // ============================================================
    async function translateText(text, targetLang) {
      if (!text || targetLang === 'en') return text;
      try {
        const res = await fetch('https://libretranslate.com/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            q: text,
            source: 'auto',
            target: targetLang,
            format: 'text',
            api_key: '',
          }),
        });
        const data = await res.json();
        return data.translatedText || text;
      } catch (e) {
        return text;
      }
    }

    // ============================================================
    // UTILITIES
    // ============================================================
    function extractDomain(url) {
      try { return new URL(url).hostname.replace('www.', ''); } catch (e) { return url; }
    }

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ============================================================
    // INIT
    // ============================================================
    handleRoute();
  </script>
</body>
