<!DOCTYPE html>
<html lang="en" data-theme="dark" style="scroll-behavior: smooth;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NaS - Not a Search Engine</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- SPA redirect handler -->
  <script>
    const _redirect = sessionStorage.getItem('spa_redirect');
    if (_redirect) {
      sessionStorage.removeItem('spa_redirect');
      window.history.replaceState(null, '', _redirect);
    }
  </script>

  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      transition: background 0.15s cubic-bezier(0.4, 0, 0.2, 1), color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }
    a { color: inherit; text-decoration: none; }
    button {
      border: none;
      background: none;
      cursor: pointer;
      font-family: inherit;
      color: inherit;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    input {
      font-family: inherit;
      outline: none;
      background: transparent;
      border: none;
      color: inherit;
      font-size: 16px;
      -webkit-appearance: none;
    }
    img { max-width: 100%; display: block; }

    /* ===== VARIABLES ===== */
    :root {
      --bg-primary: #0f0f0f;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #2a2a2a;
      --accent: #4285f4;
      --accent-light: #5c9aff;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-tertiary: #5f6368;
      --border: #303134;
      --success: #34a853;
      --error: #ea4335;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --max-content: 720px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    [data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --bg-tertiary: #e8eaed;
      --text-primary: #202124;
      --text-secondary: #5f6368;
      --text-tertiary: #9aa0a6;
      --border: #dadce0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.08);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
    }

    /* ===== ANIMATIONS ===== */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }
    @keyframes springIn {
      0% { transform: scale(0.5); opacity: 0; }
      60% { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes progressBar {
      0% { width: 0%; }
      60% { width: 70%; }
      100% { width: 100%; }
    }
    @keyframes confettiFall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.5; }
    }
    @keyframes emojiFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ===== UTILITY ===== */
    .hidden { display: none !important; }
    .fade-in { animation: fadeIn 0.25s cubic-bezier(0.4, 0, 0.2, 1) both; }
    .slide-up { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1) both; }
    .skeleton-bar {
      background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-secondary) 50%, var(--bg-tertiary) 75%);
      background-size: 200% 100%;
      border-radius: var(--radius-sm);
      animation: shimmer 1.5s ease-in-out infinite;
    }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .line-clamp-3 {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ===== APP ===== */
    #app { min-height: 100vh; width: 100%; }

    /* ===== SETTINGS ICON ===== */
    .settings-icon {
      position: absolute;
      top: var(--space-md);
      right: var(--space-md);
      z-index: 10;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-full);
      color: var(--text-secondary);
      transition: color 0.2s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s cubic-bezier(0.4, 0, 0.2, 1), transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      touch-action: manipulation;
    }
    .settings-icon:hover {
      color: var(--text-primary);
      background: var(--bg-tertiary);
      transform: rotate(30deg);
    }

    /* ===== HOME ===== */
    .home-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-md);
      padding-top: max(var(--space-md), var(--safe-top));
      padding-bottom: max(var(--space-md), var(--safe-bottom));
      position: relative;
      gap: var(--space-lg);
    }
    .home-logo {
      font-size: 72px;
      font-weight: 800;
      color: var(--accent);
      user-select: none;
      cursor: grab;
      position: relative;
      animation: float 3s ease-in-out infinite alternate;
      transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      letter-spacing: -2px;
      will-change: transform;
    }
    .home-logo:active { cursor: grabbing; }
    .home-logo.dragging { animation: none; transition: none; }
    .home-logo.wiggling { animation: wiggle 0.25s ease-in-out infinite alternate; }
    .home-logo.spring-back {
      transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      transform: translate(0, 0) !important;
    }

    .search-bar-container {
      width: 100%;
      max-width: 580px;
      position: relative;
    }
    .search-bar {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      padding: var(--space-sm) var(--space-md);
      transition: border-color 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      min-height: 48px;
    }
    .search-bar:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(66, 133, 244, 0.15);
    }
    .search-bar input {
      flex: 1;
      font-size: 16px;
      min-width: 0;
      height: 100%;
      padding: 4px 0;
    }
    .search-bar input::placeholder { color: var(--text-tertiary); }
    .search-bar .search-icon { color: var(--text-tertiary); flex-shrink: 0; }
    .search-bar .clear-btn {
      color: var(--text-tertiary);
      padding: 2px;
      border-radius: var(--radius-full);
      display: none;
      flex-shrink: 0;
      touch-action: manipulation;
    }
    .search-bar .clear-btn:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    .search-bar .clear-btn.visible { display: block; }
    .search-bar .loading-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--bg-tertiary);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
      display: none;
    }
    .search-bar .loading-spinner.active { display: block; }

    .header-search-bar { height: 44px; padding: var(--space-sm) var(--space-md); }

    .recommendations {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      justify-content: center;
      max-width: 580px;
      width: 100%;
    }
    .rec-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-sm) var(--space-md);
      cursor: pointer;
      transition: border-color 0.2s cubic-bezier(0.4, 0, 0.2, 1), transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      flex: 1 1 180px;
      max-width: 260px;
      touch-action: manipulation;
      will-change: transform;
    }
    .rec-card:hover {
      border-color: rgba(66, 133, 244, 0.4);
      transform: translateY(-2px);
    }
    .rec-card-title {
      font-weight: 500;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }
    .rec-card-snippet {
      color: var(--text-secondary);
      font-size: 12px;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recent-searches { max-width: 580px; width: 100%; }
    .recent-label {
      color: var(--text-secondary);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-sm);
    }
    .chips-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: var(--space-xs) var(--space-sm);
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.2s cubic-bezier(0.4, 0, 0.2, 1), color 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      touch-action: manipulation;
    }
    .chip:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .chip svg { flex-shrink: 0; }

    /* ===== SEARCH PAGE ===== */
    .search-page {
      min-height: 100vh;
      padding-top: 125px;
      padding-bottom: var(--space-2xl, 48px);
      padding-left: max(var(--space-md), var(--safe-left));
      padding-right: max(var(--space-md), var(--safe-right));
    }
    .search-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(15, 15, 15, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: var(--space-md);
      padding: 0 var(--space-md);
      padding-top: max(0px, var(--safe-top));
      z-index: 10;
      transition: background 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }
    [data-theme="light"] .search-header {
      background: rgba(255, 255, 255, 0.92);
    }
    .search-header-logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: -1px;
      touch-action: manipulation;
    }
    .search-header .search-bar-container { flex: 1; max-width: 680px; }
    .search-header .settings-icon { position: static; flex-shrink: 0; }

    .tabs-nav {
      position: fixed;
      top: 64px;
      left: 0;
      right: 0;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      padding: 0 var(--space-md);
      padding-left: max(var(--space-md), var(--safe-left));
      padding-right: max(var(--space-md), var(--safe-right));
      display: flex;
      gap: var(--space-xl);
      z-index: 9;
      transition: background 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs-nav::-webkit-scrollbar { display: none; }
    .tab {
      padding: var(--space-sm) 0;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 14px;
      border-bottom: 2px solid transparent;
      transition: color 0.2s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      white-space: nowrap;
      touch-action: manipulation;
      flex-shrink: 0;
    }
    .tab:hover { color: var(--text-primary); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .results-container {
      max-width: var(--max-content);
      margin-left: var(--space-lg);
      padding: 0 var(--space-md);
      -webkit-overflow-scrolling: touch;
    }
    .results-meta {
      color: var(--text-secondary);
      font-size: 13px;
      margin-bottom: var(--space-md);
    }

    .result-item {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.2s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    .result-item:last-child { border-bottom: none; }
    .result-source {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      font-size: 13px;
      color: var(--text-secondary);
    }
    .result-favicon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .result-title {
      font-size: clamp(16px, 2.5vw, 20px);
      font-weight: 500;
      color: var(--accent);
      cursor: pointer;
      line-height: 1.3;
      display: inline;
      transition: color 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .result-title:hover { text-decoration: underline; color: var(--accent-light); }
    .result-url {
      font-size: 14px;
      color: var(--success);
      word-break: break-all;
    }
    .result-snippet {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .result-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: rgba(66, 133, 244, 0.1);
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      width: fit-content;
    }

    .featured-result {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin-bottom: var(--space-md);
      border: 1px solid var(--border);
      animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    .featured-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: var(--space-sm);
    }

    .skeleton-result {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border);
    }
    .skeleton-result .skeleton-bar { height: 12px; }

    /* PAA */
    .paa-section {
      margin-top: var(--space-xl);
      max-width: var(--max-content);
      margin-left: var(--space-lg);
      padding: 0 var(--space-md);
    }
    .paa-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: var(--space-md);
    }
    .accordion-item {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      margin-bottom: var(--space-xs);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-md);
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: background 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      touch-action: manipulation;
    }
    .accordion-header:hover { background: var(--bg-tertiary); }
    .accordion-header .chevron {
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
      color: var(--text-secondary);
    }
    .accordion-header.open .chevron { transform: rotate(180deg); }
    .accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .accordion-body.open { max-height: 500px; }
    .accordion-content {
      padding: 0 var(--space-md) var(--space-md);
      color: var(--text-secondary);
      font-size: clamp(15px, 2vw, 16px);
      line-height: 1.5;
      opacity: 0;
      transition: opacity 0.2s 0.1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .accordion-body.open .accordion-content { opacity: 1; }

    .related-section {
      margin-top: var(--space-xl);
      max-width: var(--max-content);
      margin-left: var(--space-lg);
      padding: 0 var(--space-md);
    }
    .related-title {
      color: var(--text-secondary);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-sm);
    }

    /* IMAGE GRID */
    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: var(--space-sm);
      padding: var(--space-md);
      padding-left: 0;
      padding-right: 0;
    }
    .image-card {
      aspect-ratio: 1;
      border-radius: var(--radius-sm);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      background: var(--bg-tertiary);
      touch-action: manipulation;
      will-change: transform;
    }
    .image-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .image-card:hover img { transform: scale(1.05); }
    .image-card .image-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: var(--space-md) var(--space-sm) var(--space-sm);
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      color: white;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0;
      transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .image-card:hover .image-overlay { opacity: 1; }

    /* VIDEO GRID */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-md);
      padding: var(--space-md);
      padding-left: 0;
      padding-right: 0;
    }
    .video-card {
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      touch-action: manipulation;
      will-change: transform;
    }
    .video-card:hover { transform: scale(1.02); }
    .video-card:hover .video-title { color: var(--accent); }
    .video-thumb {
      aspect-ratio: 16/9;
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--bg-tertiary);
      position: relative;
    }
    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .video-card:hover .video-thumb img { transform: scale(1.03); }
    .video-duration {
      position: absolute;
      bottom: var(--space-sm);
      right: var(--space-sm);
      background: rgba(0,0,0,0.8);
      color: white;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
    }
    .video-title {
      font-size: 14px;
      font-weight: 500;
      margin-top: var(--space-sm);
      line-height: 1.3;
      transition: color 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .video-source {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      color: var(--text-secondary);
      font-size: 12px;
      margin-top: 2px;
    }

    /* EMPTY STATE */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-md);
      padding: var(--space-xl) var(--space-md);
      color: var(--text-secondary);
      text-align: center;
    }
    .empty-state svg { color: var(--text-tertiary); }
    .empty-state .try-again-btn {
      background: var(--accent);
      color: white;
      padding: var(--space-sm) var(--space-lg);
      border-radius: var(--radius-md);
      font-weight: 500;

    @media (max-width: 639px) {

    }

    // ============================================================
    // AUDIO ENGINE
    // ============================================================
    let audioPlayer = null;

    function initAudio() {
      if (audioPlayer) return;
      audioPlayer = new Audio();
      audioPlayer.loop = true;
      audioPlayer.volume = state.music.volume / 100;
      loadTrack(state.music.currentTrack);
    }

    function loadTrack(index) {
      state.music.currentTrack = Math.max(0, Math.min(index, TRACKS.length - 1));
      if (audioPlayer) {
        audioPlayer.src = TRACKS[state.music.currentTrack].url;
        if (state.music.enabled) {
          audioPlayer.play().catch(() => {});
        }
      }
      localStorage.setItem('nas_music_track', state.music.currentTrack);
      updateMusicUI();
    }

    function setVolume(val) {
      state.music.volume = Math.max(0, Math.min(100, val));
      if (audioPlayer) audioPlayer.volume = state.music.volume / 100;
      localStorage.setItem('nas_music_volume', state.music.volume);
      updateMusicUI();
    }

    function toggleMusic(enabled) {
      state.music.enabled = enabled;
      localStorage.setItem('nas_music_enabled', JSON.stringify(enabled));
      if (!audioPlayer) initAudio();
      if (enabled) {
        audioPlayer.play().catch(() => {});
      } else {
        audioPlayer.pause();
      }
      updateMusicUI();
    }

    function nextTrack() {
      loadTrack((state.music.currentTrack + 1) % TRACKS.length);
    }

    function prevTrack() {
      loadTrack((state.music.currentTrack - 1 + TRACKS.length) % TRACKS.length);
    }

    function updateMusicUI() {
      const onBtn = document.getElementById('music-on-btn');
      const offBtn = document.getElementById('music-off-btn');
      const trackName = document.getElementById('music-track-name');
      const slider = document.getElementById('music-volume-slider');
      const label = document.getElementById('music-volume-label');

      if (onBtn) onBtn.classList.toggle('active', state.music.enabled);
      if (offBtn) offBtn.classList.toggle('active', !state.music.enabled);
      if (trackName) trackName.textContent = TRACKS[state.music.currentTrack].name;
      if (slider) slider.value = state.music.volume;
      if (label) label.textContent = state.music.volume;
    }

    // Autoplay policy: init hanya setelah user interaksi pertama
    document.addEventListener('click', () => {
      if (state.music.enabled && !audioPlayer) initAudio();
    }, { once: true });

    // ============================================================
    // ROUTING
    // ============================================================
    function navigateTo(url) {
      window.history.pushState({}, '', url);
      handleRoute();
    }

    function handleRoute() {
      const path = window.location.pathname;
      const params = new URLSearchParams(window.location.search);

      if (path === '/' || path === '') {
        navigateTo('/home');
        return;
      }

      state.route = path;
      state.query = params.get('q') || '';
      state.tab = params.get('tab') || 'all';

      render();

      if (state.route === '/search' && state.query) {
        if (state.query.toLowerCase() === 'nyahoo') {
          // Nyahoo rendered in render()
        } else {
          requestAnimationFrame(() => {
            setTimeout(() => performSearch(), 0);
          });
        }
      }
    }

    window.addEventListener('popstate', handleRoute);

    document.addEventListener('click', (e) => {
      const a = e.target.closest('a');
      if (a && a.getAttribute('href') && a.getAttribute('href').startsWith('/') && !a.getAttribute('href').startsWith('//')) {
        e.preventDefault();
        navigateTo(a.getAttribute('href'));
      }
    });

    // ============================================================
    // RENDER
    // ============================================================
    function render() {
      const app = document.getElementById('app');
      if (state.route === '/home') {
        app.innerHTML = '';
        app.appendChild(renderHome());
      } else if (state.route === '/search') {
        app.innerHTML = '';
        if (state.query.toLowerCase() === 'nyahoo') {
          app.appendChild(renderNyahooPage());
        } else {
          app.appendChild(renderSearchPage());
        }
      }
    }

    function renderHome() {
      const container = document.createElement('div');
      container.className = 'home-page fade-in';

      const settingsBtn = document.createElement('button');
      settingsBtn.className = 'settings-icon';
      settingsBtn.innerHTML = ICONS.settings;
      settingsBtn.onclick = openSettings;
      container.appendChild(settingsBtn);

      const logo = document.createElement('div');
      logo.className = 'home-logo';
      logo.textContent = 'NaS';
      setupDraggableLogo(logo);
      container.appendChild(logo);

      const searchContainer = document.createElement('div');
      searchContainer.className = 'search-bar-container';
      searchContainer.innerHTML = `
        <div class="search-bar">
          ${ICONS.search}
          <input type="text" placeholder="${state.language === 'id' ? 'Cari di NaS atau ketik URL' : 'Search NaS or type a URL'}" id="home-search-input" autocomplete="off" />
          <button class="clear-btn" id="home-clear-btn">${ICONS.clear}</button>
          <div class="loading-spinner" id="home-spinner"></div>
        </div>
      `;
      container.appendChild(searchContainer);

      setTimeout(() => {
        const input = document.getElementById('home-search-input');
        const clearBtn = document.getElementById('home-clear-btn');
        if (!input) return;
        input.focus();
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && input.value.trim()) {
            navigateTo('/search?q=' + encodeURIComponent(input.value.trim()));
          }
        });
        input.addEventListener('input', () => clearBtn.classList.toggle('visible', input.value.length > 0));
        clearBtn.addEventListener('click', () => { input.value = ''; clearBtn.classList.remove('visible'); input.focus(); });
      }, 0);

      // Recommendations
      const recs = getRecommendations();
      if (recs.length > 0) {
        const recsContainer = document.createElement('div');
        recsContainer.className = 'recommendations slide-up';
        recs.forEach(rec => {
          const card = document.createElement('div');
          card.className = 'rec-card';
          card.innerHTML = `<div class="rec-card-title">${ICONS.wiki} ${escapeHtml(rec.title)}</div><div class="rec-card-snippet">${escapeHtml(rec.snippet)}</div>`;
          card.addEventListener('click', () => navigateTo('/search?q=' + encodeURIComponent(rec.title)));
          recsContainer.appendChild(card);
        });
        container.appendChild(recsContainer);
      }

      // Recent searches
      if (state.searchHistory.length > 0) {
        const recentContainer = document.createElement('div');

        state.searchHistory.slice(0, 10).forEach(query => {

          chip.addEventListener('click', () => navigateTo('/search?q=' + encodeURIComponent(query)));
          chipsRow.appendChild(chip);
        });
        recentContainer.appendChild(chipsRow);
        container.appendChild(recentContainer);
      }

      return container;

    function renderSearchPage() {

            navigateTo('/search?q=' + encodeURIComponent(input.value.trim()));
          }

    function renderSearchResultsContent() {
      const content = document.getElementById('search-content');
      if (!content) return;
      content.innerHTML = '';

      updateLoadingSpinner(state.isLoading);

      if (state.isLoading) {
        content.innerHTML = renderSkeletonResults();

      }

      if (state.tab === 'all') renderAllTab(content);
      else if (state.tab === 'images') renderImagesTab(content);
      else if (state.tab === 'videos') renderVideosTab(content);

    function updateLoadingSpinner(isLoading) {
      const homeSpinner = document.getElementById('home-spinner');
      const headerSpinner = document.getElementById('header-spinner');
      if (homeSpinner) homeSpinner.classList.toggle('active', isLoading);
      if (headerSpinner) headerSpinner.classList.toggle('active', isLoading);
    }

    // ===== RENDER ALL TAB =====
    function renderAllTab(container) {
      const wrap = document.createElement('div');

      const meta = document.createElement('div');
      meta.className = 'results-meta';
      meta.textContent = (state.language === 'id' ? 'Sekitar ' : 'About ') + state.searchResults.length +
        (state.language === 'id' ? ' hasil' : ' results') + (state.query ? ' untuk "' + escapeHtml(state.query) + '"' : '');
      wrap.appendChild(meta);

      const resultsContainer = document.createElement('div');
      resultsContainer.className = 'results-container';

      // Featured (Wikipedia)
      let featuredIndex = -1;
      for (let i = 0; i < state.searchResults.length; i++) {
        if (state.searchResults[i].source === 'wikipedia' || state.searchResults[i].source === 'Wikipedia') {
          featuredIndex = i;
          break;
        }
      }
      if (featuredIndex === -1 && state.searchResults.length > 0) featuredIndex = 0;

      if (featuredIndex !== -1 && state.searchResults.length > 0) {
        const featured = state.searchResults[featuredIndex];
        const featuredEl = document.createElement('div');
        featuredEl.className = 'featured-result';
        const sourceLabel = featured.source || 'Wikipedia';
        featuredEl.innerHTML = `
          <div class="featured-badge">${ICONS.wiki} ${escapeHtml(sourceLabel)}</div>
          <div class="result-title" data-url="${escapeHtml(featured.url)}">${escapeHtml(featured.title)}</div>
          <div class="result-snippet">${escapeHtml(featured.snippet)}</div>
        `;
        featuredEl.querySelector('.result-title').addEventListener('click', () => openInAppBrowser(featured.url));
        resultsContainer.appendChild(featuredEl);

      // All other results
      state.searchResults.forEach((result, i) => {
        if (i === featuredIndex) return;
        const item = document.createElement('div');
        item.className = 'result-item';

        const domain = extractDomain(result.url);
        item.innerHTML = `
          <div class="result-source">
            <img class="result-favicon" src="https://www.google.com/s2/favicons?domain=${escapeHtml(domain)}&sz=64" alt="" onerror="this.style.display='none'" />

          <div class="result-snippet">${escapeHtml(result.snippet || '')}</div>
          ${result.source ? `<span class="result-tag">${escapeHtml(result.source)}</span>` : ''}
        `;
        item.querySelector('.result-title').addEventListener('click', () => openInAppBrowser(result.url));
        resultsContainer.appendChild(item);
      });

      if (state.searchResults.length === 0 && !state.isLoading) {
        resultsContainer.innerHTML = `
          <div class="empty-state">
            ${ICONS.search}
            <div>${state.language === 'id' ? 'Tidak ada hasil untuk' : 'No results for'} "${escapeHtml(state.query)}"</div>

          </div>

      // PAA

        const relatedTitle = document.createElement('div');
        relatedTitle.className = 'related-title';

    // ============================================================
    // FETCH WITH TIMEOUT
    // ============================================================
    function fetchWithTimeout(url, options = {}, ms = 8000) {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), ms);
      return fetch(url, { ...options, signal: controller.signal })
        .finally(() => clearTimeout(id));
    }

    // ============================================================
    // SEARCH — MAIN
    // ============================================================
    async function performSearch() {
      // Cache key include language
      const cacheKey = `nas_cache_${state.query}_${state.tab}_${state.language}`;
      const cached = sessionStorage.getItem(cacheKey);
      if (cached) {
        try {
          const c = JSON.parse(cached);
          Object.assign(state, c);
          state.isLoading = false;
          renderSearchResultsContent();
          // Apply translation after render
          await applyTranslation();
          return;
        } catch (e) {}
      }

      state.isLoading = true;
      state.searchResults = [];
      state.peopleAlsoAsk = [];
      state.relatedSearches = [];
      state.imageResults = [];
      state.videoResults = [];
      renderSearchResultsContent();

      if (state.query && !state.searchHistory.includes(state.query)) {
        state.searchHistory.unshift(state.query);
        if (state.searchHistory.length > 20) state.searchHistory.pop();
        localStorage.setItem('nas_search_history', JSON.stringify(state.searchHistory));
      }

      try {
        if (state.tab === 'all') {
          await Promise.allSettled([
            fetchWikipedia(),
            fetchDuckDuckGo(),
            fetchOpenSearch(),
            fetchCuratedSources(),
          ]);
        } else if (state.tab === 'images') {
          await fetchImages();
        } else if (state.tab === 'videos') {
          await fetchVideos();
        }
      } catch (e) {
        console.error('Search error:', e);
      }

      state.isLoading = false;
      renderSearchResultsContent();
      // Apply translation after render
      await applyTranslation();

      try {
        sessionStorage.setItem(cacheKey, JSON.stringify({
          searchResults: state.searchResults,
          peopleAlsoAsk: state.peopleAlsoAsk,
          relatedSearches: state.relatedSearches,
          imageResults: state.imageResults,
          videoResults: state.videoResults,
        }));
      } catch (e) {}
    }

    // ============================================================
    // APPLY TRANSLATION — FIX BAGIAN 2
    // ============================================================
    async function applyTranslation() {
      if (state.language !== 'id') return;
      if (state.isLoading) return;

      // Target elements: snippet, accordion content, rec card snippet
      const targets = document.querySelectorAll('.result-snippet, .accordion-content, .rec-card-snippet');
      const elementsToTranslate = [];

      targets.forEach(el => {
        const original = el.textContent.trim();
        if (original && original.length > 0) {
          elementsToTranslate.push({ el, original });
        }
      });

      // Translate in parallel with throttling
      const promises = elementsToTranslate.map(async ({ el, original }) => {
        try {
          const translated = await translateText(original, 'id');
          if (translated && translated !== original) {
            el.textContent = translated;
          }
        } catch (e) {
          // Keep original text
        }
      });

      await Promise.allSettled(promises);
    }

    // ============================================================
    // FETCH WIKIPEDIA
    // ============================================================
    async function fetchWikipedia() {
      try {
        const res = await fetchWithTimeout(
          `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(state.query)}&format=json&origin=*`
        );
        const data = await res.json();
        if (!data.query?.search) return;

        const items = data.query.search.slice(0, 15);
        const results = await Promise.allSettled(items.map(async (item) => {
          let snippet = item.snippet.replace(/<[^>]*>/g, '');
          try {
            const summaryRes = await fetchWithTimeout(
              `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(item.title)}`
            );
            const s = await summaryRes.json();
            if (s.extract) snippet = s.extract.substring(0, 300);
          } catch (e) {}
          return {
            title: item.title,
            url: `https://en.wikipedia.org/wiki/${encodeURIComponent(item.title.replace(/ /g, '_'))}`,
            snippet,
            source: 'wikipedia',
          };
        }));

        const existingUrls = new Set(state.searchResults.map(r => r.url));
        results.forEach(r => {
          if (r.status === 'fulfilled' && !existingUrls.has(r.value.url)) {
            state.searchResults.push(r.value);
            existingUrls.add(r.value.url);
          }
        });
      } catch (e) { console.error('Wikipedia error:', e); }
    }

    // ============================================================
    // FETCH DUCKDUCKGO — multiple proxies
    // ============================================================
    async function fetchDuckDuckGo() {
      const proxies = [
        (q) => `https://api.allorigins.win/get?url=${encodeURIComponent('https://api.duckduckgo.com/?q=' + encodeURIComponent(q) + '&format=json&no_html=1&no_redirect=1&skip_disambig=1')}`,
        (q) => `https://corsproxy.io/?${encodeURIComponent('https://api.duckduckgo.com/?q=' + encodeURIComponent(q) + '&format=json&no_html=1&no_redirect=1&skip_disambig=1')}`,
      ];

      for (const proxyFn of proxies) {
        try {
          const url = proxyFn(state.query);
          const res = await fetchWithTimeout(url);
          let data;
          const text = await res.text();

          if (url.includes('allorigins')) {
            try {
              const wrapped = JSON.parse(text);
              data = JSON.parse(wrapped.contents);
            } catch (e) { continue; }
          } else {
            try {
              data = JSON.parse(text);
            } catch (e) { continue; }
          }

          if (!data) continue;

          if (data.AbstractText) {
            state.searchResults.push({
              title: data.Heading || state.query,
              url: data.AbstractURL || `https://duckduckgo.com/?q=${encodeURIComponent(state.query)}`,
              snippet: data.AbstractText,
              source: 'Wikipedia (DDG)',
            });
          }

          if (data.Results && Array.isArray(data.Results)) {
            data.Results.forEach(r => {
              if (r.FirstURL && r.Text) {
                const parts = r.Text.split(' - ');
                state.searchResults.push({
                  title: parts[0] || r.Text,
                  url: r.FirstURL,
                  snippet: parts.slice(1).join(' - ') || '',
                  source: 'DuckDuckGo',
                });
              }
            });
          }

          if (data.RelatedTopics && Array.isArray(data.RelatedTopics)) {
            data.RelatedTopics.forEach(topic => {
              if (topic.Text && topic.FirstURL) {
                const parts = topic.Text.split(' - ');
                if (parts.length >= 2) {
                  state.peopleAlsoAsk.push({
                    question: parts[0].trim(),
                    answer: parts.slice(1).join(' - ').trim() || 'Learn more',
                  });
                } else if (topic.Text.length > 5) {
                  state.relatedSearches.push(topic.Text);
                }
              }
            });
          }

          return;
        } catch (e) {
          console.log('DuckDuckGo proxy failed:', e.message);
          continue;
        }
      }
      console.warn('All DuckDuckGo proxies failed');
    }

    // ============================================================
    // FETCH OPENSEARCH
    // ============================================================
    async function fetchOpenSearch() {
      try {
        const res = await fetchWithTimeout(
          `https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(state.query)}&limit=10&namespace=0&format=json`
        );
        const data = await res.json();
        if (data && data[1]) {
          const existingUrls = new Set(state.searchResults.map(r => r.url));
          for (let i = 0; i < data[1].length; i++) {
            const url = data[3][i] || `https://en.wikipedia.org/wiki/${encodeURIComponent(data[1][i].replace(/ /g, '_'))}`;
            if (!existingUrls.has(url)) {
              state.searchResults.push({
                title: data[1][i],
                url: url,
                snippet: data[2][i] || '',
                source: 'Wikipedia (OpenSearch)',
              });
              existingUrls.add(url);
            }
          }
        }
      } catch (e) { console.error('OpenSearch error:', e); }
    }

    // ============================================================
    // FETCH CURATED SOURCES — sync (bukan async)
    // ============================================================
    function fetchCuratedSources() {
      const key = Object.keys(CURATED).find(k => state.query.toLowerCase().includes(k));
      if (key) {
        const existingUrls = new Set(state.searchResults.map(r => r.url));
        CURATED[key].forEach(item => {
          if (!existingUrls.has(item.url)) {
            state.searchResults.push({ ...item, source: 'Curated' });
            existingUrls.add(item.url);
          }
        });
      }
    }

    // ============================================================
    // FETCH IMAGES
    // ============================================================
    async function fetchImages() {
      try {
        const res = await fetchWithTimeout(
          `https://commons.wikimedia.org/w/api.php?action=query&list=search&srnamespace=6&srsearch=${encodeURIComponent(state.query)}&format=json&origin=*`
        );
        const data = await res.json();
        if (!data.query?.search) return;

        const items = data.query.search.slice(0, 16);
        const results = await Promise.allSettled(items.map(async (item) => {
          const imgRes = await fetchWithTimeout(
            `https://commons.wikimedia.org/w/api.php?action=query&titles=File:${encodeURIComponent(item.title.replace('File:', ''))}&prop=imageinfo&iiprop=url|thumburl&iiurlwidth=400&format=json&origin=*`
          );
          const imgData = await imgRes.json();
          const page = Object.values(imgData.query.pages)[0];
          if (!page.imageinfo?.[0]) throw new Error('no image');
          const info = page.imageinfo[0];
          return {
            url: info.thumburl || info.url,
            title: item.title.replace('File:', '').replace(/_/g, ' '),
            pageUrl: info.descriptionurl || '',
          };
        }));

        state.imageResults = results.filter(r => r.status === 'fulfilled').map(r => r.value);
      } catch (e) { console.error('Images error:', e); }
    }

    // ============================================================
    // FETCH VIDEOS — robust URL parsing
    // ============================================================
    async function fetchVideos() {
      try {
        const res = await fetchWithTimeout(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(state.query)}&filter=videos`);
        const data = await res.json();
        if (data.items) {
          state.videoResults = data.items.slice(0, 20).map(item => {
            let videoId = '';
            try {
              const url = new URL(item.url);
              videoId = url.searchParams.get('v') || url.pathname.split('/').pop() || '';
            } catch (e) {
              videoId = item.url.split('/').pop() || '';
            }
            return {
              title: item.title,
              url: `https://www.youtube.com/watch?v=${videoId}`,
              thumbnail: item.thumbnail,
              duration: item.duration ? formatDuration(item.duration) : '',
            };
          });
        }
      } catch (e) {
        console.error('Videos error:', e);
        state.videoResults = [{
          title: `Search "${state.query}" on YouTube`,
          url: `https://www.youtube.com/results?search_query=${encodeURIComponent(state.query)}`,
          thumbnail: 'https://img.youtube.com/vi/0/0.jpg',
          duration: '',
        }];
      }
    }

    function formatDuration(seconds) {
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    // ============================================================
    // RECOMMENDATIONS
    // ============================================================
    function getRecommendations() {
      if (state.searchHistory.length === 0) return [];
      const freq = {};
      state.searchHistory.forEach(q => { const key = q.toLowerCase(); freq[key] = (freq[key] || 0) + 1; });
      const top = Object.entries(freq).sort((a, b) => b[1] - a[1]).slice(0, 3).map(([term]) => term);
      const recs = [];
      top.forEach(term => {
        if (state.recommendations[term]) recs.push(state.recommendations[term]);
        else fetchWikipediaSummary(term);
      });
      return recs;
    }

    async function fetchWikipediaSummary(term) {
      try {
        const res = await fetchWithTimeout(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(term)}`);
        const data = await res.json();
        if (data.extract) {
          state.recommendations[term] = {
            title: data.title || term,
            snippet: data.extract.substring(0, 120) + '...',
          };
          localStorage.setItem('nas_recommendations', JSON.stringify(state.recommendations));
          if (state.route === '/home') render();
        }
      } catch (e) {}
    }

    // ============================================================
    // DRAGGABLE LOGO — with click vs drag detection
    // ============================================================
    function setupDraggableLogo(logo) {
      // Cleanup old listeners
      if (state.dragListeners.mousemove) {
        document.removeEventListener('mousemove', state.dragListeners.mousemove);
        document.removeEventListener('mouseup', state.dragListeners.mouseup);
        document.removeEventListener('touchmove', state.dragListeners.touchmove);
        document.removeEventListener('touchend', state.dragListeners.touchend);
      }

      let startX = 0, startY = 0;
      let didDrag = false;
      const DRAG_THRESHOLD = 5;

      const onStart = (e) => {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        startX = clientX;
        startY = clientY;
        didDrag = false;

        state.isDraggingLogo = true;
        logo.classList.add('dragging', 'wiggling');
        const rect = logo.getBoundingClientRect();
        state.dragOffset.x = clientX - (rect.left + rect.width / 2);
        state.dragOffset.y = clientY - (rect.top + rect.height / 2);
        if (navigator.vibrate) navigator.vibrate(10);
      };

      const onMove = (e) => {
        if (!state.isDraggingLogo) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const dx = Math.abs(clientX - startX);
        const dy = Math.abs(clientY - startY);
        if (dx > DRAG_THRESHOLD || dy > DRAG_THRESHOLD) {
          didDrag = true;
          e.preventDefault();
        }
        if (!didDrag) return;

        const x = clientX - state.dragOffset.x - window.innerWidth / 2;
        const y = clientY - state.dragOffset.y - window.innerHeight / 2;
        const maxX = window.innerWidth / 2 - logo.offsetWidth / 2;
        const maxY = window.innerHeight / 2 - logo.offsetHeight / 2;
        state.logoPos.x = Math.max(-maxX, Math.min(maxX, x));
        state.logoPos.y = Math.max(-maxY, Math.min(maxY, y));
        logo.style.transform = `translate(${state.logoPos.x}px, ${state.logoPos.y}px) scale(1.05)`;
      };

      const onEnd = () => {
        if (!state.isDraggingLogo) return;
        state.isDraggingLogo = false;
        logo.classList.remove('dragging', 'wiggling');

        if (!didDrag) {
          // This is a click, not a drag → open tips
          state.logoPos = { x: 0, y: 0 };
          logo.style.transform = '';
          openTips();
          return;
        }

        // This is a drag → spring back
        state.logoPos = { x: 0, y: 0 };
        logo.classList.add('spring-back');
        logo.style.transform = '';
        setTimeout(() => logo.classList.remove('spring-back'), 600);
      };

      state.dragListeners.mousemove = onMove;
      state.dragListeners.mouseup = onEnd;
      state.dragListeners.touchmove = onMove;
      state.dragListeners.touchend = onEnd;

      logo.addEventListener('mousedown', onStart);
      logo.addEventListener('touchstart', onStart, { passive: true });
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend', onEnd);
    }

    // ============================================================
    // IN-APP BROWSER — X-Frame-Options detection
    // ============================================================
    function openInAppBrowser(url) {
      state.isBrowserOpen = true;
      state.browserUrl = url;
      const browser = document.getElementById('in-app-browser');
      const iframe = document.getElementById('browser-iframe');
      const address = document.getElementById('browser-address');
      const errorEl = document.getElementById('browser-error');
      const progress = document.getElementById('browser-progress');

      browser.classList.add('active');
      document.body.style.overflow = 'hidden';
      address.textContent = url;
      errorEl.classList.remove('active');
      progress.classList.remove('done');
      progress.classList.add('loading');
      iframe.style.display = '';

      let loadTimeout;
      let loaded = false;

      const handleLoad = () => {
        loaded = true;
        clearTimeout(loadTimeout);
        progress.classList.remove('loading');
        progress.classList.add('done');
        try {
          if (iframe.contentDocument) {
            errorEl.classList.remove('active');
          }
        } catch (e) {
          showBrowserError(url);
        }
      };

      iframe.onload = handleLoad;
      iframe.onerror = () => { showBrowserError(url); };

      loadTimeout = setTimeout(() => {
        if (!loaded) {
          try {
            if (iframe.contentDocument && iframe.contentDocument.readyState === 'complete') {
              loaded = true;
              progress.classList.remove('loading');
              progress.classList.add('done');
              return;
            }
          } catch (e) {
            showBrowserError(url);
          }
          showBrowserError(url);
        }
      }, 4000);

      iframe.src = url;
      document.getElementById('browser-error-url').textContent = url;
    }

    function showBrowserError(url) {
      const iframe = document.getElementById('browser-iframe');
      const errorEl = document.getElementById('browser-error');
      const progress = document.getElementById('browser-progress');
      iframe.style.display = 'none';
      errorEl.classList.add('active');
      progress.classList.remove('loading');
      progress.classList.add('done');
    }

    function closeInAppBrowser() {
      const browser = document.getElementById('in-app-browser');
      const iframe = document.getElementById('browser-iframe');
      const errorEl = document.getElementById('browser-error');
      const progress = document.getElementById('browser-progress');
      browser.classList.remove('active');
      document.body.style.overflow = '';
      iframe.src = 'about:blank';
      iframe.style.display = '';
      errorEl.classList.remove('active');
      progress.classList.remove('loading', 'done');
      state.isBrowserOpen = false;
      state.browserUrl = '';
    }

    document.getElementById('browser-close').addEventListener('click', closeInAppBrowser);
    document.getElementById('browser-back').addEventListener('click', () => { try { document.getElementById('browser-iframe').contentWindow.history.back(); } catch(e) {} });
    document.getElementById('browser-forward').addEventListener('click', () => { try { document.getElementById('browser-iframe').contentWindow.history.forward(); } catch(e) {} });
    document.getElementById('browser-refresh').addEventListener('click', () => {

        state.language = btn.dataset.lang;
        localStorage.setItem('nas_language', state.language);
        document.querySelectorAll('.toggle-option[data-lang]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
        if (state.route === '/search' && state.query) {
          requestAnimationFrame(() => setTimeout(() => performSearch(), 0));
        }
      });
    });

    document.querySelectorAll('.toggle-option[data-theme]').forEach(btn => {
      btn.addEventListener('click', () => {
        state.theme = btn.dataset.theme;
        localStorage.setItem('nas_theme', state.theme);
        document.documentElement.setAttribute('data-theme', state.theme);
        document.querySelectorAll('.toggle-option[data-theme]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    document.getElementById('clear-history-btn').addEventListener('click', () => {
      if (confirm(state.language === 'id' ? 'Hapus semua riwayat pencarian?' : 'Clear all search history?')) {
        state.searchHistory = [];
        localStorage.removeItem('nas_search_history');
        if (state.route === '/home') render();
      }
    });

    document.getElementById('clear-cache-btn').addEventListener('click', () => {
      if (confirm(state.language === 'id' ? 'Hapus cache rekomendasi?' : 'Clear recommendations cache?')) {
        state.recommendations = {};
        localStorage.removeItem('nas_recommendations');
        if (state.route === '/home') render();
      }
    });

    document.getElementById('modal-overlay').addEventListener('click', closeSettings);
    document.getElementById('modal-close').addEventListener('click', closeSettings);

    // ============================================================
    // TRANSLATE — multiple instances + fallback
    // ============================================================
    async function translateText(text, targetLang) {
      if (!text || targetLang === 'en') return text;

      const instances = [
        'https://translate.fedilab.app/translate',
        'https://libretranslate.de/translate',
        'https://translate.terraprint.co/translate',
      ];

      for (const instance of instances) {
        try {
          const res = await fetch(instance, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              q: text,
              source: 'auto',
              target: targetLang,
              format: 'text',
              api_key: '',
            }),
          });
          if (!res.ok) continue;
          const data = await res.json();
          if (data.translatedText) {
            return data.translatedText;
          }
        } catch (e) {
          console.log(`Translate instance ${instance} failed:`, e.message);
          continue;
        }
      }

      console.warn('All translate instances failed, returning original text');
      return text;
    }

    // ============================================================
    // UTILITIES
    // ============================================================
    function extractDomain(url) {
      try { return new URL(url).hostname.replace('www.', ''); } catch (e) { return url; }
    }

    function escapeHtml(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ============================================================
    // INIT
    // ============================================================
    handleRoute();
  </script>
